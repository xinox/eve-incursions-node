version: "3.7"

services:
  server:
    command: sh -c "npm i && npm run prod"
    restart: unless-stopped

  frontend:
    command: sh -c "npm i && npm run build && npm start"
    restart: unless-stopped

  mysql:
    restart: unless-stopped

  caddy:
    restart: unless-stopped
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile

  mysql_backup:
    image: databack/mysql-backup
    restart: always
    volumes:
      - ../backups:/db
    environment:
      - DB_DUMP_TARGET=s3://eve-incursions-mysql-backups/backups
      - DB_USER=${MYSQL_USER}
      - DB_PASS=${MYSQL_PASSWORD}
      - DB_DUMP_FREQ=1440
      - DB_DUMP_BEGIN=0
      - DB_SERVER=${MYSQL_HOST}
      - DB_DUMP_KEEP_PERMISSIONS=false
      - AWS_ENDPOINT_URL=https://storage.googleapis.com
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
