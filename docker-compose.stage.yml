version: "3.7"

services:
  server:
    command: sh -c "npm i && npm run prod"
    restart: unless-stopped
    labels:
      caddy: beta.eve-incursions.de
      caddy.reverse_proxy: /api/* {{upstreams 4001}}
      caddy.@cachedFiles.path: "*.jpg *.jpeg *.png *.gif *.ico *.svg"
      caddy.header: '@cachedFiles Cache-Control "public, max-age=604800, must-revalidate"'

  frontend:
    command: sh -c "npm i && npm run build && npm start"
    restart: unless-stopped
    labels:
      caddy: beta.eve-incursions.de
      caddy.reverse_proxy: /* {{upstreams 3000}}
      caddy.@cachedFiles.path: "*.jpg *.jpeg *.png *.gif *.ico *.svg"
      caddy.header: '@cachedFiles Cache-Control "public, max-age=604800, must-revalidate"'

  mysql:
    restart: unless-stopped
