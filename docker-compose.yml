version: "3.7"

services:
  server:
    image: node:16-alpine
    working_dir: /eve-incursions/server
    restart: unless-stopped
    networks:
      - caddy
      - internal
    volumes:
      - ./:/eve-incursions
    environment:
      - MYSQL_HOST
      - MYSQL_USER
      - MYSQL_PASSWORD
      - MYSQL_DB

  frontend:
    image: node:16-alpine
    working_dir: /eve-incursions/frontend
    restart: unless-stopped
    networks:
      - caddy
      - internal
    volumes:
      - ./:/eve-incursions

  mysql:
    image: mysql:5.7
    restart: unless-stopped
    volumes:
      - eve-incursions-mysql-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB}
      MYSQL_ROOT_HOST: "%"
    networks:
      - internal
    ports:
    - 3313:3306

  redis:
    restart: unless-stopped
    image: library/redis:6
    networks:
      - internal


volumes:
  eve-incursions-mysql-data:

networks:
  caddy:
    external: true
  internal:
